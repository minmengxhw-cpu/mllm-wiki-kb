<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
background:linear-gradient(160deg,#0a2a5e 0%,#14478f 55%,#1a5bb8 100%);
min-height:100vh;color:#fff;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.wrap{max-width:480px;margin:0 auto;padding:32px 22px}
.head{text-align:center;margin-bottom:26px}
.head h1{font-size:23px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.head p{font-size:13px;opacity:.7}
.search{position:relative;margin-bottom:18px}
.search input{width:100%;height:54px;border:none;border-radius:14px;padding:0 52px 0 18px;
font-size:17px;background:rgba(255,255,255,.97);color:#1a2a44;box-shadow:0 6px 20px rgba(0,0,0,.18)}
.search input:focus{outline:none}
.search .ico{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:20px;opacity:.45}
.tip{text-align:center;font-size:12px;opacity:.55;margin-bottom:20px}
.results{display:flex;flex-direction:column;gap:14px}
.card{background:#fff;color:#1a2a44;border-radius:16px;padding:20px;
box-shadow:0 8px 24px rgba(0,0,0,.16);animation:up .28s ease}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.card .name{font-size:22px;font-weight:700;margin-bottom:4px}
.card .unit{font-size:14px;color:#5a6b85;margin-bottom:16px}
.seat{display:flex;align-items:center;justify-content:center;gap:18px;
background:linear-gradient(135deg,#eaf2ff,#dbe9ff);border-radius:12px;padding:18px 0}
.seat .blk{text-align:center}
.seat .blk .num{font-size:34px;font-weight:800;color:#14478f;line-height:1}
.seat .blk .lab{font-size:12px;color:#7a89a3;margin-top:5px}
.seat .div{width:1px;height:38px;background:#c3d4ef}
.empty{text-align:center;padding:40px 0;opacity:.7}
.empty .em{font-size:42px;margin-bottom:12px}
.empty p{font-size:15px}
.foot{text-align:center;font-size:11px;opacity:.4;margin-top:40px;line-height:1.7}
.multi{font-size:12px;color:#c0392b;background:#fff4f0;border-radius:8px;
padding:8px 12px;margin-bottom:12px;text-align:center}
</style>
</head>
