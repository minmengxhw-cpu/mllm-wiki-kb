<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1E3A5C">
  <title>民盟知识库</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 应用主体（内容加载后显示） -->
  <div id="app" hidden>
    <header class="topbar">
      <div class="bar-inner">
        <a class="brand" href="#/">
          <span class="brand-mark" aria-hidden="true">盟</span>
          <span class="brand-text">民盟知识库</span>
        </a>
        <form class="searchbox" id="searchForm">
          <input id="searchInput" type="search" placeholder="检索人物、事件、提法、盟史…">
        </form>
        <nav class="topnav">
          <a href="#/entities">实体</a>
          <a href="#/formulations">提法</a>
        </nav>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content" id="view"></main>
    </div>

    <footer class="foot">
      <span id="footMeta"></span>
      <span class="dot">·</span>
      <span>仅供盟内研究与素材起草参考，二手信息需回原文核验</span>
    </footer>

    <nav class="mobile-nav">
      <a href="#/">首页</a>
      <a href="#/search">检索</a>
      <a href="#/entities">实体</a>
      <a href="#/formulations">提法</a>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
